<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoices - AP Invoice Intake Agent</title>
    <link rel="stylesheet" href="/vendor/fonts.css">
    <script src="/vendor/tailwindcss.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary:  { 50:'#eff6ff', 100:'#dbeafe', 200:'#bfdbfe', 300:'#93c5fd', 400:'#60a5fa', 500:'#0057B8', 600:'#004a9e', 700:'#003d84', 800:'#00306a', 900:'#002350' },
                        accent:   { 50:'#fff7ed', 100:'#ffedd5', 200:'#fed7aa', 300:'#fdba74', 400:'#fb923c', 500:'#F97316', 600:'#ea580c', 700:'#c2410c', 800:'#9a3412', 900:'#7c2d12' },
                        neutral:  { 50:'#fafafa', 100:'#f5f5f5', 200:'#e5e5e5', 300:'#d4d4d4', 400:'#a3a3a3', 500:'#737373', 600:'#525252', 700:'#404040', 800:'#262626', 900:'#171717' }
                    },
                    fontFamily: {
                        heading: ['"DM Sans"', 'sans-serif'],
                        body:    ['"Inter"', 'sans-serif']
                    }
                }
            }
        };
    </script>
    <style type="text/tailwindcss">
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3, h4, h5, h6 { font-family: 'DM Sans', sans-serif; }
    </style>
</head>
<body class="bg-neutral-50 min-h-screen">

    <!-- Top Nav -->
    <nav class="bg-white border-b border-neutral-200 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-14">
                <div class="flex items-center gap-6">
                    <a href="/app/dashboard.html" class="flex items-center gap-2">
                        <img src="/rapid_circle_logo.png" alt="Logo" class="h-8 w-auto">
                    </a>
                    <div class="flex items-center gap-1 text-sm font-medium">
                        <a href="/app/dashboard.html" class="px-3 py-1.5 rounded-md text-neutral-600 hover:bg-neutral-100 transition-colors">Dashboard</a>
                        <a href="/app/invoices.html" class="px-3 py-1.5 rounded-md bg-primary-50 text-primary-700">Invoices</a>
                        <a href="/app/vendors.html" class="px-3 py-1.5 rounded-md text-neutral-600 hover:bg-neutral-100 transition-colors">Vendors</a>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <span id="userName" class="text-sm text-neutral-600"></span>
                    <button id="btnLogout" class="text-sm text-neutral-500 hover:text-red-600 transition-colors">Sign Out</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Page Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Page Header -->
        <div class="flex items-center justify-between mb-6">
            <h1 class="text-2xl font-bold text-neutral-900">All Invoices</h1>
            <button id="btnUploadOpen"
                    class="bg-primary-500 hover:bg-primary-600 text-white font-semibold py-2 px-4 rounded-lg text-sm transition-colors">
                + Create Invoice
            </button>
        </div>

        <!-- Search and Filter -->
        <div class="mb-6 flex items-center gap-3">
            <input id="searchInput" type="text" placeholder="Search by vendor, invoice number, or status..."
                   class="flex-1 max-w-md border border-neutral-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none">
            <button id="btnFilterOpen"
                    class="flex items-center gap-2 bg-white border border-neutral-300 hover:bg-neutral-50 text-neutral-700 font-medium py-2 px-4 rounded-lg text-sm transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"/>
                </svg>
                Filter
            </button>
            <button id="btnFilterReset"
                    class="flex items-center gap-2 bg-neutral-100 hover:bg-neutral-200 text-neutral-700 font-medium py-2 px-3 rounded-lg text-sm transition-colors"
                    style="display: none;">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                </svg>
                Clear
            </button>
        </div>

        <!-- Filter Panel -->
        <div id="filterPanel" class="mb-6 hidden bg-white border border-neutral-200 rounded-lg p-5 shadow-sm">
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4">
                <!-- Vendor Name Filter -->
                <div>
                    <label class="block text-xs font-semibold text-neutral-600 mb-2">Vendor Name</label>
                    <input id="filterVendor" type="text" placeholder="Search vendor..."
                           class="w-full border border-neutral-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none">
                </div>

                <!-- Invoice Number Filter -->
                <div>
                    <label class="block text-xs font-semibold text-neutral-600 mb-2">Invoice Number</label>
                    <input id="filterGst" type="text" placeholder="Search invoice number..."
                           class="w-full border border-neutral-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none">
                </div>

                <!-- Price Range - Min -->
                <div>
                    <label class="block text-xs font-semibold text-neutral-600 mb-2">Min Price</label>
                    <input id="filterPriceMin" type="number" placeholder="Min amount"
                           class="w-full border border-neutral-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none">
                </div>

                <!-- Price Range - Max -->
                <div>
                    <label class="block text-xs font-semibold text-neutral-600 mb-2">Max Price</label>
                    <input id="filterPriceMax" type="number" placeholder="Max amount"
                           class="w-full border border-neutral-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none">
                </div>

                <!-- Date Range - Start Date -->
                <div>
                    <label class="block text-xs font-semibold text-neutral-600 mb-2">Start Date</label>
                    <input id="filterDateFrom" type="date"
                           class="w-full border border-neutral-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none">
                </div>

                <!-- Date Range - Last Date -->
                <div>
                    <label class="block text-xs font-semibold text-neutral-600 mb-2">Last Date</label>
                    <input id="filterDateTo" type="date"
                           class="w-full border border-neutral-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none">
                </div>

                <!-- Status Filter -->
                <div>
                    <label class="block text-xs font-semibold text-neutral-600 mb-2">Status</label>
                    <select id="filterStatus"
                            class="w-full border border-neutral-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none">
                        <option value="">All Statuses</option>
                        <option value="Received">Received</option>
                        <option value="ReadyForZoho">Ready for Zoho</option>
                        <option value="Exception">Exception</option>
                        <option value="InReview">In Review</option>
                        <option value="Corrected">Corrected</option>
                    </select>
                </div>

                <!-- Currency Filter -->
                <div>
                    <label class="block text-xs font-semibold text-neutral-600 mb-2">Currency</label>
                    <select id="filterCurrency"
                            class="w-full border border-neutral-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none">
                        <option value="">All Currencies</option>
                        <option value="INR">INR</option>
                        <option value="USD">USD</option>
                        <option value="EUR">EUR</option>
                        <option value="GBP">GBP</option>
                        <option value="AED">AED</option>
                        <option value="SGD">SGD</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Invoice Table -->
        <div class="bg-white rounded-xl border border-neutral-200">
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead>
                        <tr class="border-b border-neutral-100 text-left">
                            <th class="px-5 py-3 font-medium text-neutral-500">Vendor</th>
                            <th class="px-5 py-3 font-medium text-neutral-500">Invoice #</th>
                            <th class="px-5 py-3 font-medium text-neutral-500">Date</th>
                            <th class="px-5 py-3 font-medium text-neutral-500">Amount</th>
                            <th class="px-5 py-3 font-medium text-neutral-500">Currency</th>
                            <th class="px-5 py-3 font-medium text-neutral-500">Status</th>
                            <th class="px-5 py-3 font-medium text-neutral-500">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="invoicesBody">
                        <tr><td colspan="7" class="px-5 py-8 text-center text-neutral-400">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Create Invoice Modal -->
    <div id="uploadModal" class="fixed inset-0 z-50 hidden overflow-y-auto">
        <div class="absolute inset-0 bg-black/40" id="uploadBackdrop"></div>
        <div class="relative flex items-start justify-center min-h-screen p-4 pt-12">
            <div class="bg-white rounded-2xl shadow-xl border border-neutral-200 w-full max-w-2xl p-6 relative mb-12">
                <h2 class="text-lg font-semibold text-neutral-900 mb-1">Create Invoice</h2>
                <p class="text-xs text-neutral-500 mb-5">Enter invoice details or upload a file for AI extraction</p>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <!-- Vendor -->
                    <div class="sm:col-span-2">
                        <label class="block text-sm font-medium text-neutral-700 mb-1">Vendor Legal Name <span class="text-red-500">*</span></label>
                        <select id="uploadVendor"
                                class="w-full border border-neutral-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none">
                            <option value="">-- Select vendor or type below --</option>
                        </select>
                        <input id="uploadVendorCustom" type="text" placeholder="Or type vendor name manually"
                               class="w-full border border-neutral-300 rounded-lg px-3 py-2 text-sm mt-1 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none">
                    </div>

                    <!-- Invoice Number -->
                    <div>
                        <label class="block text-sm font-medium text-neutral-700 mb-1">Invoice Number <span class="text-red-500">*</span></label>
                        <input id="fldInvoiceNumber" type="text" placeholder="e.g. INV-2026-001"
                               class="w-full border border-neutral-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none">
                    </div>

                    <!-- Invoice Date -->
                    <div>
                        <label class="block text-sm font-medium text-neutral-700 mb-1">Invoice Date <span class="text-red-500">*</span></label>
                        <input id="fldInvoiceDate" type="date"
                               class="w-full border border-neutral-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none">
                    </div>

                    <!-- Currency -->
                    <div>
                        <label class="block text-sm font-medium text-neutral-700 mb-1">Currency <span class="text-red-500">*</span></label>
                        <select id="fldCurrency"
                                class="w-full border border-neutral-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none">
                            <option value="INR" selected>INR - Indian Rupee</option>
                            <option value="USD">USD - US Dollar</option>
                            <option value="EUR">EUR - Euro</option>
                            <option value="GBP">GBP - British Pound</option>
                            <option value="AED">AED - UAE Dirham</option>
                            <option value="SGD">SGD - Singapore Dollar</option>
                        </select>
                    </div>

                    <!-- Total Amount -->
                    <div>
                        <label class="block text-sm font-medium text-neutral-700 mb-1">Total Amount (incl. tax) <span class="text-red-500">*</span></label>
                        <input id="fldTotalAmount" type="number" step="0.01" min="0" placeholder="e.g. 2450000"
                               class="w-full border border-neutral-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none">
                    </div>

                    <!-- Tax Amount -->
                    <div>
                        <label class="block text-sm font-medium text-neutral-700 mb-1">Tax Amount</label>
                        <input id="fldTaxAmount" type="number" step="0.01" min="0" placeholder="e.g. 441000"
                               class="w-full border border-neutral-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none">
                    </div>

                    <!-- PO Number -->
                    <div>
                        <label class="block text-sm font-medium text-neutral-700 mb-1">PO Number</label>
                        <input id="fldPoNumber" type="text" placeholder="e.g. PO-2026-101"
                               class="w-full border border-neutral-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none">
                    </div>

                    <!-- Email Sender -->
                    <div>
                        <label class="block text-sm font-medium text-neutral-700 mb-1">Email Sender</label>
                        <input id="fldEmailSender" type="email" placeholder="e.g. accounts@vendor.com"
                               class="w-full border border-neutral-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none">
                    </div>

                    <!-- Line Items Summary -->
                    <div class="sm:col-span-2">
                        <label class="block text-sm font-medium text-neutral-700 mb-1">Line Items Description</label>
                        <textarea id="fldLineItems" rows="2" placeholder="e.g. SAP Implementation Phase 2, Cloud Migration Services"
                                  class="w-full border border-neutral-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none resize-none"></textarea>
                    </div>

                    <!-- File Upload -->
                    <div class="sm:col-span-2">
                        <label class="block text-sm font-medium text-neutral-700 mb-1">Invoice Attachment (optional)</label>
                        <div class="border-2 border-dashed border-neutral-300 rounded-lg p-4 text-center hover:border-primary-400 transition-colors cursor-pointer" id="uploadDropZone">
                            <input id="uploadFile" type="file" accept=".pdf,.png,.jpg,.jpeg" class="hidden">
                            <div class="flex items-center justify-center gap-3">
                                <svg class="w-6 h-6 text-neutral-400" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/></svg>
                                <p id="uploadFileName" class="text-sm text-neutral-500">Click to select or drag a file (PDF, PNG, JPG)</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="flex justify-end gap-3 mt-6 pt-4 border-t border-neutral-100">
                    <button id="btnUploadCancel"
                            class="px-4 py-2 text-sm font-medium text-neutral-600 hover:bg-neutral-100 rounded-lg transition-colors">
                        Cancel
                    </button>
                    <button id="btnUploadSubmit"
                            class="px-4 py-2 text-sm font-semibold text-white bg-primary-500 hover:bg-primary-600 rounded-lg transition-colors">
                        Create Invoice
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="fixed top-4 right-4 z-50 space-y-2"></div>

    <script src="/js/authService.js"></script>
    <script src="/app/app.js"></script>
    <script src="/app/js/invoices.js"></script>
</body>
</html>
