# Deploy to Azure Static Web Apps
#
# MANUAL TRIGGER ONLY — Go to Actions tab → "Deploy to Azure Static Web Apps" → "Run workflow"
# This prevents accidental deploys during the hackathon.
#
# To re-enable auto-deploy on push, uncomment the push/pull_request triggers below.

name: Deploy to Azure Static Web Apps

on:
  # Manual trigger only — click "Run workflow" in GitHub Actions tab
  workflow_dispatch:

  # Auto-deploy disabled during hackathon.
  # Uncomment below to re-enable:
  # push:
  #   branches: [ "main" ]
  # pull_request:
  #   types: [opened, synchronize, reopened, closed]
  #   branches: [ "main" ]

env:
  APP_LOCATION: "/"
  API_LOCATION: "api"
  APP_ARTIFACT_LOCATION: ""
  AZURE_STATIC_WEB_APPS_API_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}

permissions:
  contents: read

jobs:
  build_and_deploy:
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Build And Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ env.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: ${{ env.APP_LOCATION }}
          api_location: ${{ env.API_LOCATION }}
          app_artifact_location: ${{ env.APP_ARTIFACT_LOCATION }}
